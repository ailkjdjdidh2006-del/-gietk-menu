<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جيتك JETEK - منيو المطعم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
    --orange:#E67E22; --orange-light:#F39C12; --orange-dark:#D35400;
    --navy:#0F172A; --navy-light:#1E293B; --card:#1a1a2e;
    --white:#FFFFFF; --gray:#94A3B8;
    --success:#10B981; --danger:#EF4444;
    --grad:linear-gradient(135deg, #E67E22 0%, #F39C12 50%, #D35400 100%);
    --grad-dark:linear-gradient(180deg, #0F172A 0%, #1E293B 100%);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
    font-family:'Cairo',sans-serif;
    background:var(--navy);
    color:var(--white);
    overflow-x:hidden;
}

/* HERO */
.hero {
    min-height:100vh;
    background:var(--grad-dark);
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 20px;
    overflow:hidden;
}
.hero::before {
    content:'';
    position:absolute;
    top:-50%; left:-50%;
    width:200%; height:200%;
    background:radial-gradient(circle, rgba(230,126,34,0.08) 0%, transparent 70%);
    animation:pulseGlow 8s ease-in-out infinite;
}
@keyframes pulseGlow {
    0%,100%{transform:scale(1);opacity:0.5;}
    50%{transform:scale(1.2);opacity:1;}
}
.hero-content { position:relative; z-index:2; }
.logo-main {
    width:120px; height:120px;
    background:var(--grad);
    border-radius:30px;
    display:flex;
    align-items:center; justify-content:center;
    margin:0 auto 30px;
    font-size:50px;
    box-shadow:0 10px 40px rgba(230,126,34,0.4),0 0 40px rgba(230,126,34,0.15);
    animation:float 3s ease-in-out infinite;
    transform:rotate(-5deg);
}
@keyframes float {
    0%,100%{transform:translateY(0) rotate(-5deg);}
    50%{transform:translateY(-15px) rotate(-5deg);}
}
.hero h1 {
    font-size:clamp(2.5rem,8vw,5rem);
    font-weight:900;
    background:var(--grad);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    letter-spacing:4px;
    margin-bottom:10px;
}
.hero-subtitle {
    font-size:1.2rem;
    color:var(--gray);
    font-weight:600;
    margin-bottom:40px;
    letter-spacing:8px;
    text-transform:uppercase;
}
.hero-desc {
    font-size:1.1rem;
    color:var(--gray);
    max-width:500px;
    margin:0 auto 40px;
    line-height:1.8;
}
.scroll-indicator {
    position:absolute;
    bottom:30px; left:50%;
    transform:translateX(-50%);
    animation:bounce 2s infinite;
    color:var(--orange);
    font-size:1.5rem;
}
@keyframes bounce {
    0%,20%,50%,80%,100%{transform:translateX(-50%) translateY(0);}
    40%{transform:translateX(-50%) translateY(-15px);}
    60%{transform:translateX(-50%) translateY(-8px);}
}

/* CONTACT STRIP */
.contact-strip {
    background:rgba(230,126,34,0.1);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(230,126,34,0.2);
    padding:15px 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    flex-wrap:wrap;
    font-size:0.95rem;
    position:sticky;
    top:0;
    z-index:100;
}
.contact-strip a {
    color:var(--orange);
    text-decoration:none;
    font-weight:700;
    transition:all 0.3s;
    display:flex;
    align-items:center;
    gap:8px;
}
.contact-strip a:hover { color:var(--white); }
.contact-strip span { color:var(--gray); display:flex; align-items:center; gap:8px; }

/* FLOATING CART */
.floating-cart {
    position:fixed;
    bottom:30px; left:30px;
    z-index:1000;
    background:var(--grad);
    border:none;
    width:65px; height:65px;
    border-radius:50%;
    cursor:pointer;
    box-shadow:0 8px 25px rgba(230,126,34,0.4);
    transition:all 0.3s;
    display:flex;
    align-items:center; justify-content:center;
    font-size:24px;
    color:white;
}
.floating-cart:hover {
    transform:scale(1.1) rotate(-5deg);
    box-shadow:0 12px 35px rgba(230,126,34,0.5);
}
.cart-badge {
    position:absolute;
    top:-5px; right:-5px;
    background:var(--danger);
    color:white;
    width:28px; height:28px;
    border-radius:50%;
    font-size:13px;
    font-weight:800;
    display:flex;
    align-items:center; justify-content:center;
    border:3px solid var(--navy);
}

/* ADMIN BUTTON */
.admin-float {
    position:fixed;
    top:20px; right:20px;
    z-index:1001;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    color:var(--gray);
    width:45px; height:45px;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    align-items:center; justify-content:center;
    font-size:18px;
    transition:all 0.3s;
    backdrop-filter:blur(10px);
}
.admin-float:hover {
    background:rgba(230,126,34,0.2);
    color:var(--orange);
    border-color:var(--orange);
}

/* MENU */
.menu-wrapper {
    max-width:900px;
    margin:0 auto;
    padding:40px 20px;
}
.section-title {
    text-align:center;
    margin-bottom:50px;
}
.section-title h2 {
    font-size:2rem;
    font-weight:800;
    color:var(--orange);
    margin-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}
.section-title p { color:var(--gray); font-size:1rem; }

.category-section {
    margin-bottom:60px;
    opacity:0;
    transform:translateY(40px);
    transition:all 0.6s ease;
}
.category-section.visible {
    opacity:1;
    transform:translateY(0);
}

.category-header {
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:25px;
    padding:0 10px;
}
.category-icon {
    width:50px; height:50px;
    background:var(--grad);
    border-radius:15px;
    display:flex;
    align-items:center; justify-content:center;
    font-size:24px;
    box-shadow:0 4px 15px rgba(230,126,34,0.3);
}
.category-header h3 {
    font-size:1.4rem;
    font-weight:800;
    color:var(--white);
}
.category-header .line {
    flex:1;
    height:2px;
    background:linear-gradient(90deg, var(--orange), transparent);
    margin-right:15px;
    border-radius:2px;
}

.food-grid {
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
}

.food-card {
    background:var(--card);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:20px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:all 0.4s;
    position:relative;
    overflow:hidden;
}
.food-card::before {
    content:'';
    position:absolute;
    top:0; left:0;
    width:4px; height:100%;
    background:var(--grad);
    opacity:0;
    transition:opacity 0.3s;
}
.food-card:hover::before { opacity:1; }
.food-card:hover {
    transform:translateX(-8px) scale(1.01);
    border-color:rgba(230,126,34,0.2);
    box-shadow:0 0 40px rgba(230,126,34,0.15);
}
.food-card.unavailable {
    opacity:0.4;
    pointer-events:none;
    filter:grayscale(0.8);
}
.food-card.unavailable .food-name::after {
    content:" (نفذت الكمية)";
    color:var(--danger);
    font-size:0.8rem;
    font-weight:600;
}

.food-info { flex:1; }
.food-name {
    font-size:1.15rem;
    font-weight:700;
    color:var(--white);
    margin-bottom:6px;
}
.food-price {
    font-size:1.3rem;
    font-weight:900;
    background:var(--grad);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.food-price .meal-price {
    font-size:0.85rem;
    font-weight:400;
    color:var(--gray);
    -webkit-text-fill-color:var(--gray);
    display:block;
    margin-top:2px;
}

.food-actions {
    display:flex;
    align-items:center;
    gap:12px;
    margin-right:15px;
}
.qty-control {
    display:flex;
    align-items:center;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    padding:4px;
    gap:4px;
}
.qty-btn {
    width:36px; height:36px;
    border:none;
    background:transparent;
    color:var(--white);
    font-size:18px;
    cursor:pointer;
    border-radius:10px;
    transition:all 0.2s;
    display:flex;
    align-items:center; justify-content:center;
    font-family:'Cairo',sans-serif;
    font-weight:700;
}
.qty-btn:hover {
    background:rgba(230,126,34,0.2);
    color:var(--orange);
}
.qty-num {
    min-width:30px;
    text-align:center;
    font-weight:800;
    font-size:1.1rem;
    color:var(--orange);
}
.add-btn {
    background:var(--grad);
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:12px;
    cursor:pointer;
    font-family:'Cairo',sans-serif;
    font-weight:700;
    font-size:0.95rem;
    transition:all 0.3s;
    display:flex;
    align-items:center; gap:6px;
    box-shadow:0 4px 15px rgba(230,126,34,0.3);
}
.add-btn:hover {
    transform:scale(1.05);
    box-shadow:0 6px 20px rgba(230,126,34,0.4);
}
.add-btn:active { transform:scale(0.95); }

/* MODALS */
.modal-overlay {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(8px);
    z-index:2000;
    justify-content:center;
    align-items:flex-end;
    padding:0;
}
.modal-overlay.active { display:flex; }
.modal-sheet {
    background:var(--navy-light);
    border-radius:30px 30px 0 0;
    width:100%;
    max-width:600px;
    max-height:90vh;
    overflow-y:auto;
    animation:slideUp 0.4s;
    border-top:1px solid rgba(230,126,34,0.2);
}
@keyframes slideUp {
    from{transform:translateY(100%);}
    to{transform:translateY(0);}
}
.modal-header {
    background:var(--navy);
    padding:25px;
    border-radius:30px 30px 0 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.05);
    position:sticky;
    top:0;
    z-index:10;
}
.modal-header h2 {
    display:flex;
    align-items:center;
    gap:12px;
    font-size:1.3rem;
    color:var(--white);
}
.modal-header h2 i { color:var(--orange); }
.close-btn {
    background:rgba(255,255,255,0.08);
    border:none;
    color:var(--gray);
    width:40px; height:40px;
    border-radius:12px;
    cursor:pointer;
    font-size:18px;
    transition:all 0.3s;
    display:flex;
    align-items:center; justify-content:center;
}
.close-btn:hover {
    background:rgba(239,68,68,0.2);
    color:var(--danger);
}
.modal-body { padding:25px; }

/* CART */
.cart-item {
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:16px;
    padding:16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    transition:all 0.3s;
}
.cart-item:hover {
    background:rgba(255,255,255,0.06);
    border-color:rgba(230,126,34,0.15);
}
.cart-item-info h4 {
    color:var(--white);
    font-size:1rem;
    margin-bottom:4px;
}
.cart-item-price {
    color:var(--orange);
    font-weight:700;
    font-size:0.95rem;
}
.cart-item-qty {
    display:flex;
    align-items:center;
    gap:8px;
}
.remove-btn {
    background:rgba(239,68,68,0.15);
    color:var(--danger);
    border:none;
    width:32px; height:32px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    transition:all 0.3s;
    display:flex;
    align-items:center; justify-content:center;
}
.remove-btn:hover { background:rgba(239,68,68,0.3); }

.cart-total-box {
    background:var(--grad);
    border-radius:20px;
    padding:25px;
    text-align:center;
    margin:25px 0;
    box-shadow:0 10px 30px rgba(230,126,34,0.3);
}
.cart-total-box .label {
    font-size:1rem;
    opacity:0.9;
    margin-bottom:5px;
}
.cart-total-box .amount {
    font-size:2.2rem;
    font-weight:900;
}

/* FORM */
.form-group { margin-bottom:18px; }
.form-group label {
    display:block;
    margin-bottom:8px;
    color:var(--gray);
    font-weight:600;
    font-size:0.95rem;
    display:flex;
    align-items:center;
    gap:8px;
}
.form-group label i { color:var(--orange); }
.form-input {
    width:100%;
    padding:14px 18px;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,255,255,0.08);
    border-radius:14px;
    color:var(--white);
    font-family:'Cairo',sans-serif;
    font-size:1rem;
    transition:all 0.3s;
    outline:none;
}
.form-input:focus {
    border-color:var(--orange);
    background:rgba(230,126,34,0.05);
    box-shadow:0 0 20px rgba(230,126,34,0.1);
}
.form-input::placeholder { color:var(--gray); opacity:0.6; }
textarea.form-input { resize:vertical; min-height:80px; }

.whatsapp-btn {
    background:linear-gradient(135deg, #25D366 0%, #128C7E 100%);
    color:white;
    border:none;
    padding:18px;
    border-radius:16px;
    width:100%;
    font-family:'Cairo',sans-serif;
    font-size:1.1rem;
    font-weight:800;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    transition:all 0.3s;
    box-shadow:0 8px 25px rgba(37,211,102,0.3);
    margin-top:10px;
}
.whatsapp-btn:hover {
    transform:translateY(-3px);
    box-shadow:0 12px 35px rgba(37,211,102,0.4);
}
.whatsapp-btn i { font-size:1.4rem; }

.empty-cart {
    text-align:center;
    padding:50px 20px;
    color:var(--gray);
}
.empty-cart i {
    font-size:4rem;
    margin-bottom:20px;
    color:rgba(255,255,255,0.1);
}
.empty-cart p { font-size:1.1rem; }

/* QR */
.qr-section {
    background:var(--navy-light);
    padding:60px 20px;
    text-align:center;
    border-top:1px solid rgba(255,255,255,0.05);
    border-bottom:1px solid rgba(255,255,255,0.05);
}
.qr-section h2 {
    font-size:1.8rem;
    color:var(--white);
    margin-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}
.qr-section h2 i { color:var(--orange); }
.qr-section p {
    color:var(--gray);
    margin-bottom:30px;
    font-size:1rem;
}
.qr-box {
    display:inline-block;
    background:white;
    padding:20px;
    border-radius:24px;
    box-shadow:0 8px 30px rgba(0,0,0,0.12);
}
.qr-hint {
    margin-top:25px;
    color:var(--orange);
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

/* FOOTER */
.footer {
    background:var(--navy);
    padding:50px 20px 30px;
    text-align:center;
    border-top:1px solid rgba(255,255,255,0.05);
}
.footer-logo {
    font-size:2rem;
    font-weight:900;
    background:var(--grad);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:20px;
}
.footer-info {
    color:var(--gray);
    margin-bottom:8px;
    font-size:0.95rem;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}
.footer-info i { color:var(--orange); width:20px; }
.footer-social {
    display:flex;
    justify-content:center;
    gap:20px;
    margin:25px 0;
}
.footer-social a {
    width:45px; height:45px;
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    display:flex;
    align-items:center; justify-content:center;
    color:var(--gray);
    font-size:1.3rem;
    transition:all 0.3s;
    text-decoration:none;
}
.footer-social a:hover {
    background:var(--orange);
    color:white;
    transform:translateY(-5px);
}
.footer-copy {
    margin-top:25px;
    padding-top:20px;
    border-top:1px solid rgba(255,255,255,0.05);
    color:var(--gray);
    font-size:0.85rem;
    opacity:0.7;
}

/* ADMIN LOGIN */
.admin-login-body {
    padding:40px;
    text-align:center;
}
.lock-icon {
    width:80px; height:80px;
    background:rgba(230,126,34,0.1);
    border-radius:24px;
    display:flex;
    align-items:center; justify-content:center;
    margin:0 auto 25px;
    font-size:32px;
    color:var(--orange);
}
.admin-login-body p {
    color:var(--gray);
    margin-bottom:25px;
    font-size:1rem;
}
.admin-pass-input {
    width:100%;
    padding:16px;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,255,255,0.1);
    border-radius:14px;
    color:var(--white);
    font-family:'Cairo',sans-serif;
    font-size:1.1rem;
    text-align:center;
    margin-bottom:20px;
    outline:none;
    transition:all 0.3s;
}
.admin-pass-input:focus {
    border-color:var(--orange);
    box-shadow:0 0 20px rgba(230,126,34,0.1);
}
.admin-login-btn {
    width:100%;
    padding:14px;
    background:var(--grad);
    border:none;
    border-radius:14px;
    color:white;
    font-family:'Cairo',sans-serif;
    font-size:1.1rem;
    font-weight:700;
    cursor:pointer;
    transition:all 0.3s;
}
.admin-login-btn:hover {
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(230,126,34,0.3);
}
.admin-hint {
    margin-top:15px;
    font-size:0.85rem;
    color:var(--gray);
    opacity:0.6;
}

/* ADMIN DASHBOARD */
.admin-dash-section { margin-bottom:35px; }
.admin-dash-section h3 {
    color:var(--orange);
    font-size:1.2rem;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    gap:10px;
}
.admin-item-row {
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:14px;
    padding:14px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    flex-wrap:wrap;
    gap:10px;
    transition:all 0.3s;
}
.admin-item-row:hover {
    background:rgba(255,255,255,0.06);
    border-color:rgba(230,126,34,0.15);
}
.admin-item-name {
    font-weight:600;
    color:var(--white);
    min-width:140px;
    flex:1;
}
.admin-price-input {
    width:90px;
    padding:8px 10px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:8px;
    color:var(--white);
    font-family:'Cairo',sans-serif;
    text-align:center;
    font-size:0.95rem;
    outline:none;
}
.admin-price-input:focus { border-color:var(--orange); }
.availability-toggle {
    padding:8px 16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-family:'Cairo',sans-serif;
    font-weight:700;
    font-size:0.85rem;
    transition:all 0.3s;
    min-width:90px;
}
.availability-toggle.in-stock {
    background:rgba(16,185,129,0.15);
    color:var(--success);
}
.availability-toggle.out-stock {
    background:rgba(239,68,68,0.15);
    color:var(--danger);
}
.add-item-form {
    display:grid;
    gap:12px;
    margin-bottom:20px;
}
.add-item-form input,
.add-item-form select {
    padding:12px 16px;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,255,255,0.08);
    border-radius:12px;
    color:var(--white);
    font-family:'Cairo',sans-serif;
    font-size:1rem;
    outline:none;
}
.add-item-form input:focus,
.add-item-form select:focus { border-color:var(--orange); }
.add-item-form select option {
    background:var(--navy-light);
    color:var(--white);
}
.save-all-btn {
    width:100%;
    padding:16px;
    background:var(--grad);
    border:none;
    border-radius:14px;
    color:white;
    font-family:'Cairo',sans-serif;
    font-size:1.1rem;
    font-weight:800;
    cursor:pointer;
    transition:all 0.3s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:20px;
    box-shadow:0 8px 25px rgba(230,126,34,0.3);
}
.save-all-btn:hover {
    transform:translateY(-3px);
    box-shadow:0 12px 35px rgba(230,126,34,0.4);
}

/* TOAST */
.toast-container {
    position:fixed;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    z-index:3000;
    pointer-events:none;
}
.toast {
    background:var(--navy-light);
    color:var(--white);
    padding:16px 28px;
    border-radius:16px;
    font-weight:700;
    font-size:0.95rem;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.1);
    display:flex;
    align-items:center;
    gap:10px;
    opacity:0;
    transform:translateY(20px);
    transition:all 0.4s;
    pointer-events:auto;
    white-space:nowrap;
    margin-bottom:10px;
}
