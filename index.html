<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو مطعم جيتك الإلكتروني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jeetak: {
                            orange: '#FF5E14',
                            navy: '#0F2C59',
                            cream: '#FFFFF5',
                            lightOrange: '#FFFAF5'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #FFFFF5; }
        .active-cat { background-color: #FF5E14 !important; color: white !important; border-color: #FF5E14 !important; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 antialiased" onclick="closeCartDrawer()">

    <header class="bg-white shadow-xs border-b border-orange-100 sticky top-0 z-40">
        <div class="max-w-md mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-14 h-14 bg-gradient-to-tr from-jeetak-orange to-amber-500 rounded-full p-0.5 shadow-md flex items-center justify-center">
                    <div class="w-full h-full bg-jeetak-navy rounded-full flex items-center justify-center">
                        <span class="text-white font-black text-sm tracking-tight">جيتك</span>
                    </div>
                </div>
                <div>
                    <h1 class="text-xl font-black text-jeetak-navy flex items-center gap-1.5">مطعم جيتك</h1>
                    <p class="text-[11px] font-bold text-jeetak-orange bg-orange-50 px-2 py-0.5 rounded-full inline-block">Fresh Food</p>
                </div>
            </div>
            
            <button onclick="event.stopPropagation(); toggleCartDrawer()" class="relative bg-jeetak-navy text-white p-3 rounded-xl shadow-md hover:bg-slate-800 transition">
                <i class="fa-solid fa-basket-shopping text-lg"></i>
                <span id="global-cart-count" class="absolute -top-2 -left-2 bg-jeetak-orange text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
            </button>
        </div>

        <div class="max-w-md mx-auto px-4 pb-3 grid grid-cols-1 gap-2">
            <div class="flex items-center justify-center gap-1.5 text-[11px] font-bold text-slate-600 bg-slate-50 border border-slate-200/60 py-2 px-3 rounded-xl">
                <i class="fa-solid fa-location-dot text-jeetak-orange"></i> مجمع بوابة الكاظمية - الشارع التجاري
            </div>
            <div class="grid grid-cols-2 gap-2">
                <a href="tel:07750005345" class="flex items-center justify-center gap-1.5 py-1.5 text-[11px] font-bold text-jeetak-navy bg-amber-50/40 border border-amber-100 rounded-lg shadow-3xs">
                    <i class="fa-solid fa-phone text-jeetak-orange"></i> 07750005345
                </a>
                <a href="tel:07850005345" class="flex items-center justify-center gap-1.5 py-1.5 text-[11px] font-bold text-jeetak-navy bg-amber-50/40 border border-amber-100 rounded-lg shadow-3xs">
                    <i class="fa-solid fa-mobile-button text-jeetak-orange"></i> 07850005345
                </a>
            </div>
        </div>

        <div class="max-w-md mx-auto px-4 py-2 overflow-x-auto whitespace-nowrap scrollbar-none flex gap-2 border-t border-slate-100 bg-white">
            <button onclick="filterCategory('all')" id="cat-all" class="category-btn active-cat px-4 py-2 rounded-xl text-xs font-black border transition-all">🎯 الكل</button>
            <button onclick="filterCategory('pizza')" id="cat-pizza" class="category-btn px-4 py-2 rounded-xl text-xs font-black border border-slate-200 bg-slate-50 text-slate-600 transition-all">🍕 بيتزا</button>
            <button onclick="filterCategory('burger')" id="cat-burger" class="category-btn px-4 py-2 rounded-xl text-xs font-black border border-slate-200 bg-slate-50 text-slate-600 transition-all">🍔 بركر</button>
            <button onclick="filterCategory('crispy')" id="cat-crispy" class="category-btn px-4 py-2 rounded-xl text-xs font-black border border-slate-200 bg-slate-50 text-slate-600 transition-all">🥖 كرسبي</button>
            <button onclick="filterCategory('special')" id="cat-special" class="category-btn px-4 py-2 rounded-xl text-xs font-black border border-slate-200 bg-slate-50 text-slate-600 transition-all">🍗 وجبات خاصة</button>
            <button onclick="filterCategory('appetizers')" id="cat-appetizers" class="category-btn px-4 py-2 rounded-xl text-xs font-black border border-slate-200 bg-slate-50 text-slate-600 transition-all">🍟 المقبلات</button>
            <button onclick="filterCategory('drinks')" id="cat-drinks" class="category-btn px-4 py-2 rounded-xl text-xs font-black border border-slate-200 bg-slate-50 text-slate-600 transition-all">🥤 المشروبات</button>
        </div>
    </header>

    <div id="status-banner" class="max-w-md mx-auto mt-3 px-4 hidden">
        <div class="bg-red-50 border border-red-200 text-red-700 text-center py-2.5 px-4 rounded-xl text-xs font-bold flex items-center justify-center gap-2">
            <i class="fa-solid fa-circle-exclamation"></i> تم إيقاف استقبال الطلبات حالياً من قبل العميل.
        </div>
    </div>

    <main class="max-w-md mx-auto px-4 py-4 mb-28">
        <div id="menu-items-container" class="grid grid-cols-1 gap-4">
            </div>
    </main>

    <div id="cart-drawer" class="fixed inset-0 bg-slate-950/50 backdrop-blur-xs z-50 hidden flex items-end justify-center" onclick="closeCartDrawer()">
        <div class="bg-white rounded-t-3xl w-full max-w-md p-5 shadow-2xl flex flex-col max-h-[85vh]" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center pb-3 border-b border-slate-100 mb-3">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-basket-shopping text-jeetak-orange text-lg"></i>
                    <h3 class="font-black text-jeetak-navy">طلباتك الحالية</h3>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="clearCart()" class="text-xs font-bold text-red-500 bg-red-50 px-2 py-1 rounded-lg hover:bg-red-100">حذف الكل 🗑️</button>
                    <button onclick="toggleCartDrawer()" class="text-slate-400 bg-slate-100 w-8 h-8 rounded-full flex items-center justify-center border border-slate-200/40"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </div>

            <div id="cart-items-list" class="flex-1 overflow-y-auto space-y-3 pr-1 py-2 text-center text-sm font-bold text-gray-400">
                السلة فارغة حالياً.. املأها بأكلات جيتك الرهيبة!
            </div>

            <div class="border-t border-slate-100 pt-4 mt-2 space-y-3">
                <div class="flex justify-between items-center bg-orange-50/60 p-3 rounded-xl border border-orange-100/40">
                    <span class="text-xs font-black text-jeetak-navy">الحساب الإجمالي الكلي:</span>
                    <span id="cart-total-price" class="text-base font-black text-jeetak-orange">0 د.ع</span>
                </div>
                
                <div class="flex gap-2">
                    <button id="toggle-order-btn" onclick="toggleOrderStatus()" class="flex-1 bg-slate-800 text-white font-bold py-2.5 rounded-xl text-xs hover:bg-slate-700 transition">
                        🔒 إيقاف الطلب
                    </button>
                    <button id="send-whatsapp-btn" onclick="sendOrderToWhatsApp()" class="flex-[2] bg-green-500 hover:bg-green-600 text-white font-black py-3 rounded-xl text-xs flex items-center justify-center gap-2 shadow-md shadow-green-500/10 transition">
                        <i class="fa-brands fa-whatsapp text-base"></i> إرسال الطلب عبر الواتساب
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // مصفوفة البيانات الكاملة لمنيو جيتك بالأسعار والخيارات المتعددة
        const menuData = [
            // بيتزا
            { id: 1, name: "بيتزا مشكل", category: "pizza", hasOptions: false, price: 8000 },
            { id: 2, name: "بيتزا لحم", category: "pizza", hasOptions: false, price: 8000 },
            { id: 3, name: "بيتزا ببروني", category: "pizza", hasOptions: false, price: 8000 },
            { id: 4, name: "بيتزا دجاج", category: "pizza", hasOptions: false, price: 7000 },
            { id: 5, name: "بيتزا خضار", category: "pizza", hasOptions: false, price: 7000 },
            { id: 6, name: "بيتزا ماركريتا", category: "pizza", hasOptions: false, price: 6000 },

            // بركر
            { id: 7, name: "بركر كلاسك", category: "burger", hasOptions: true, prices: { sandwich: 3500, meal: 5500 } },
            { id: 8, name: "بركر جيتك", category: "burger", hasOptions: true, prices: { sandwich: 5500, meal: 7000 } },
            { id: 9, name: "تكساس بركر", category: "burger", hasOptions: true, prices: { sandwich: 4500, meal: 6000 } },
            { id: 10, name: "هالبينو بركر", category: "burger", hasOptions: true, prices: { sandwich: 4500, meal: 6000 } },
            { id: 11, name: "بركر دجاج مقرمش", category: "burger", hasOptions: true, prices: { sandwich: 4500, meal: 6000 } },

            // كرسبي
            { id: 12, name: "كرسبي كلاسك", category: "crispy", hasOptions: true, prices: { sandwich: 5000, meal: 7000 } },
            { id: 13, name: "كرسبي زنجر", category: "crispy", hasOptions: true, prices: { sandwich: 5000, meal: 7000 } },
            { id: 14, name: "كرسبي سماش", category: "crispy", hasOptions: true, prices: { sandwich: 5000, meal: 7000 } },
            { id: 15, name: "كرسبي جيتك", category: "crispy", hasOptions: true, prices: { sandwich: 5000, meal: 7000 } },
            { id: 16, name: "رول كرسبي", category: "crispy", hasOptions: true, prices: { sandwich: 5000, meal: 7000 } },
            { id: 17, name: "زنجر رول سبايسي", category: "crispy", hasOptions: true, prices: { sandwich: 5000, meal: 7000 } },

            // وجبات خاصة
            { id: 18, name: "ريزو كلاسك", category: "special", hasOptions: false, price: 4000 },
            { id: 19, name: "ريزو مكسيكي", category: "special", hasOptions: false, price: 5000 },
            { id: 20, name: "ريزو هالبينو", category: "special", hasOptions: false, price: 5000 },
            { id: 21, name: "مكس المقرمشة", category: "special", hasOptions: false, price: 6000 },
            { id: 22, name: "وجبة كرسبي", category: "special", hasOptions: false, price: 8000 },
            { id: 23, name: "ميني كرسبي", category: "special", hasOptions: false, price: 6000 },

            // مقبلات وفنكر
            { id: 24, name: "فنكر شبس", category: "appetizers", hasOptions: false, price: 2000 },
            { id: 25, name: "فنكر بالجبن", category: "appetizers", hasOptions: false, price: 3000 },
            { id: 26, name: "صحن مقبلات صغير", category: "appetizers", hasOptions: false, price: 2000 },
            { id: 27, name: "صحن مقبلات وسط", category: "appetizers", hasOptions: false, price: 3000 },
            { id: 28, name: "صحن مقبلات كبير", category: "appetizers", hasOptions: false, price: 5000 },

            // مشروبات
            { id: 29, name: "ببسي", category: "drinks", hasOptions: false, price: 500 },
            { id: 30, name: "ببسي دايت", category: "drinks", hasOptions: false, price: 500 },
            { id: 31, name: "سفن اب", category: "drinks", hasOptions: false, price: 500 },
            { id: 32, name: "سفن دايت", category: "drinks", hasOptions: false, price: 500 },
            { id: 33, name: "ميرندا", category: "drinks", hasOptions: false, price: 500 },
            { id: 34, name: "ديو", category: "drinks", hasOptions: false, price: 500 }
        ];

        let cart = [];
        let isOrderPaused = false;

        // توليد المنيو وعرضه بالكامل بالصفحة
        function renderMenu(items) {
            const container = document.getElementById('menu-items-container');
            container.innerHTML = '';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-3xs border border-slate-100 flex flex-col justify-between gap-3";
                
                if (item.hasOptions) {
                    // الوجبات اللي بيها خيارين (سندويش / وجبة)
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-black text-slate-800 text-sm mb-1">${item.name}</h3>
                                <p class="text-[11px] text-gray-400">اختر الحجم المفضل لديك للإضافة إلى السلة</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <button onclick="addToCart(${item.id}, 'sandwich')" class="bg-jeetak-lightOrange hover:bg-jeetak-orange hover:text-white border border-orange-200 text-jeetak-navy font-bold py-2 px-3 rounded-xl text-xs transition flex flex-col items-center justify-center gap-0.5">
                                <span class="text-[10px] opacity-70">سندويش</span>
                                <span class="font-extrabold">${item.prices.sandwich.toLocaleString()} د.ع</span>
                            </button>
                            <button onclick="addToCart(${item.id}, 'meal')" class="bg-jeetak-lightOrange hover:bg-jeetak-orange hover:text-white border border-orange-200 text-jeetak-navy font-bold py-2 px-3 rounded-xl text-xs transition flex flex-col items-center justify-center gap-0.5">
                                <span class="text-[10px] opacity-70">وجبة كاملة</span>
                                <span class="font-extrabold">${item.prices.meal.toLocaleString()} د.ع</span>
                            </button>
                        </div>
                    `;
                } else {
                    // الوجبات بسعر ثابت عادي
                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 class="font-black text-slate-800 text-sm">${item.name}</h3>
                            </div>
                            <span class="text-xs font-black text-jeetak-orange bg-orange-50 px-2.5 py-1 rounded-lg">${item.price.toLocaleString()} د.ع</span>
                        </div>
                        <button onclick="addToCart(${item.id}, 'normal')" class="w-full bg-slate-50 hover:bg-jeetak-orange hover:text-white border border-slate-200 text-jeetak-navy font-black py-2 rounded-xl text-xs transition flex items-center justify-center gap-1">
                            <i class="fa-solid fa-plus text-[10px]"></i> إضافة للطلبات
                        </button>
                    `;
                }
                container.appendChild(card);
            });
        }

        // تصفية المواد حسب ضغطة القسم
        function filterCategory(category) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.className = "category-btn px-4 py-2 rounded-xl text-xs font-black border border-slate-200 bg-slate-50 text-slate-600 transition-all";
            });
            const activeBtn = document.getElementById(`cat-${category}`);
            if (activeBtn) activeBtn.classList.add('active-cat');

            if (category === 'all') {
                renderMenu(menuData);
            } else {
                const filtered = menuData.filter(item => item.category === category);
                renderMenu(filtered);
            }
        }

        // إضافة العناصر إلى السلة مع تحديد النوع
        function addToCart(id, option) {
            if (isOrderPaused) {
                alert("عذراً، استقبال الطلبات مغلق حالياً!");
                return;
            }
            const item = menuData.find(p => p.id === id);
            let finalName = item.name;
            let finalPrice = item.price;

            if (item.hasOptions) {
                finalName += option === 'sandwich' ? " (سندويش)" : " (وجبة)";
                finalPrice = item.prices[option];
            }

            const cartKey = id + '-' + option;
            const exist = cart.find(c => c.cartKey === cartKey);

            if (exist) {
                exist.qty++;
            } else {
                cart.push({ cartKey, name: finalName, price: finalPrice, qty: 1 });
            }
            updateCart();
        }

        // تعديل الكميات داخل السلة (زيادة أو نقصان)
        function changeQty(cartKey, change) {
            const item = cart.find(c => c.cartKey === cartKey);
            if (!item) return;
            
            item.qty += change;
            if (item.qty <= 0) {
                cart = cart.filter(c => c.cartKey !== cartKey);
            }
            updateCart();
        }

        // حذف صنف معين بالكامل
        function removeItem(cartKey) {
            cart = cart.filter(c => c.cartKey !== cartKey);
            updateCart();
        }

        // تفريغ السلة بالكامل
        function clearCart() {
            cart = [];
            updateCart();
        }

        // تحديث المظهر الخارجي وإجمالي الحساب في السلة
        function updateCart() {
            const globalBadge = document.getElementById('global-cart-count');
            const itemsList = document.getElementById('cart-items-list');
            const totalPriceText = document.getElementById('cart-total-price');

            const totalItems = cart.reduce((acc, curr) => acc + curr.qty, 0);
            const totalPrice = cart.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);

            globalBadge.innerText = totalItems;
            totalPriceText.innerText = totalPrice.toLocaleString() + " د.ع";

            if (cart.length === 0) {
                itemsList.innerHTML = `السلة فارغة حالياً.. املأها بأكلات جيتك الرهيبة!`;
                return;
            }

            itemsList.innerHTML = '';
            cart.forEach(item => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-200/60";
                row.innerHTML = `
                    <div class="text-right">
                        <h4 class="text-xs font-black text-jeetak-navy">${item.name}</h4>
                        <span class="text-[11px] font-bold text-jeetak-orange">${(item.price * item.qty).toLocaleString()} د.ع</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-2 bg-white px-2 py-1 rounded-lg border border-slate-200">
                            <button onclick="changeQty('${item.cartKey}', -1)" class="text-slate-500 font-extrabold text-xs px-1">-</button>
                            <span class="text-xs font-black text-slate-800 min-w-[12px] text-center">${item.qty}</span>
                            <button onclick="changeQty('${item.cartKey}', 1)" class="text-slate-500 font-extrabold text-xs px-1">+</button>
                        </div>
                        <button onclick="removeItem('${item.cartKey}')" class="text-red-400 hover:text-red-600 text-xs
