<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جيتك | JETEK - منيو المطعم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #E67E22;
            --primary-dark: #D35400;
            --secondary: #1A3A5C;
            --secondary-light: #2C5282;
            --white: #FFFFFF;
            --light-bg: #FFF8F0;
            --gray: #F5F5F5;
            --text-dark: #2D3748;
            --success: #27AE60;
            --danger: #E74C3C;
            --warning: #F39C12;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--light-bg);
            color: var(--text-dark);
            overflow-x: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            animation: pulse 2s infinite;
            box-shadow: 0 0 20px rgba(230,126,34,0.4);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .logo-text {
            color: var(--white);
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .logo-sub {
            color: var(--primary);
            font-size: 1rem;
            font-weight: 600;
        }
        
        .cart-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--primary);
            color: white;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 4px 15px rgba(230,126,34,0.4);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .cart-btn:hover {
            transform: scale(1.1);
            background: var(--primary-dark);
        }
        
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .admin-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            z-index: 1001;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .admin-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .contact-bar {
            background: var(--primary);
            color: white;
            padding: 12px;
            text-align: center;
            font-size: 0.95rem;
        }
        
        .contact-bar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
        }
        
        .contact-bar i {
            margin-left: 5px;
        }
        
        .menu-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .section {
            margin-bottom: 30px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        .section-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        .section-header i {
            font-size: 1.5rem;
        }
        
        .section-body {
            padding: 15px;
        }
        
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            transition: all 0.3s;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        
        .menu-item:hover {
            background: var(--light-bg);
            transform: translateX(-5px);
        }
        
        .menu-item.unavailable {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .menu-item.unavailable .item-name::after {
            content: " (غير متوفر)";
            color: var(--danger);
            font-size: 0.8rem;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-name {
            font-weight: 700;
            color: var(--secondary);
            font-size: 1.05rem;
            margin-bottom: 5px;
        }
        
        .item-price {
            color: var(--primary-dark);
            font-weight: 900;
            font-size: 1.1rem;
        }
        
        .item-price small {
            font-size: 0.85rem;
            color: var(--text-dark);
            font-weight: 400;
        }
        
        .item-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .qty-btn {
            background: var(--gray);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            color: var(--secondary);
            transition: all 0.2s;
        }
        
        .qty-btn:hover {
            background: var(--primary);
            color: white;
        }
        
        .qty-display {
            font-weight: 700;
            min-width: 25px;
            text-align: center;
            color: var(--secondary);
        }
        
        .add-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .add-btn:hover {
            background: #219A52;
            transform: scale(1.05);
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 25px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 25px 25px 0 0;
        }
        
        .modal-header h2 {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: rgba(255,255,255,0.4);
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--light-bg);
            border-radius: 12px;
            margin-bottom: 10px;
        }
        
        .cart-item-info h4 {
            color: var(--secondary);
            margin-bottom: 3px;
        }
        
        .cart-item-price {
            color: var(--primary-dark);
            font-weight: 700;
        }
        
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .remove-btn {
            background: var(--danger);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .cart-total {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
            font-size: 1.3rem;
            font-weight: 900;
        }
        
        .order-form {
            margin-top: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--secondary);
            font-weight: 600;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--primary);
            outline: none;
        }
        
        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .whatsapp-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(37,211,102,0.4);
        }
        
        .empty-cart {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-cart i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #ddd;
        }
        
        .admin-panel {
            display: none;
        }
        
        .admin-panel.active {
            display: block;
        }
        
        .admin-section {
            margin-bottom: 25px;
        }
        
        .admin-section h3 {
            color: var(--secondary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--light-bg);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        
        .admin-item input {
            width: 100px;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Cairo';
            text-align: center;
        }
        
        .toggle-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .toggle-btn.available {
            background: var(--success);
            color: white;
        }
        
        .toggle-btn.unavailable {
            background: var(--danger);
            color: white;
        }
        
        .add-item-form {
            display: grid;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .add-item-form input, .add-item-form select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: 'Cairo';
        }
        
        .save-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 700;
            transition: all 0.3s;
        }
        
        .save-btn:hover {
            background: #219A52;
        }
        
        .qr-section {
            text-align: center;
            padding: 30px 20px;
            background: white;
            margin: 20px auto;
            max-width: 800px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        .qr-section h2 {
            color: var(--secondary);
            margin-bottom: 15px;
        }
        
        #qrcode {
            display: inline-block;
            padding: 15px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .footer {
            background: var(--secondary);
            color: white;
            text-align: center;
            padding: 25px;
            margin-top: 30px;
        }
        
        .footer h3 {
            color: var(--primary);
            margin-bottom: 10px;
        }
        
        .footer p {
            margin: 5px 0;
            opacity: 0.9;
        }
        
        .footer .social {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .footer .social a {
            color: white;
            font-size: 1.5rem;
            transition: all 0.3s;
        }
        
        .footer .social a:hover {
            color: var(--primary);
            transform: translateY(-3px);
        }
        
        .password-form {
            text-align: center;
            padding: 30px;
        }
        
        .password-form input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-family: 'Cairo';
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .password-form button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-family: 'Cairo';
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .section {
            animation: fadeIn 0.5s ease forwards;
        }
        
        .section:nth-child(1) { animation-delay: 0.1s; }
        .section:nth-child(2) { animation-delay: 0.2s; }
        .section:nth-child(3) { animation-delay: 0.3s; }
        .section:nth-child(4) { animation-delay: 0.4s; }
        .section:nth-child(5) { animation-delay: 0.5s; }
        .section:nth-child(6) { animation-delay: 0.6s; }
        
        @media (max-width: 600px) {
            .logo-text { font-size: 1.8rem; }
            .section-header { font-size: 1.1rem; padding: 15px; }
            .menu-item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .item-actions { width: 100%; justify-content: flex-end; }
            .cart-btn { width: 50px; height: 50px; font-size: 20px; }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--secondary);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 600;
            z-index: 3000;
            opacity: 0;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
    </style>
</head>
<body>

    <header class="header">
        <button class="admin-btn" onclick="openAdminLogin()" title="لوحة التحكم">
            <i class="fas fa-cog"></i>
        </button>
        
        <div class="logo-container">
            <div class="logo-icon">
                <i class="fas fa-utensils"></i>
            </div>
            <div>
                <div class="logo-text">جيتك</div>
                <div class="logo-sub">JETEK RESTAURANT</div>
            </div>
        </div>
    </header>
    
    <div class="contact-bar">
        <i class="fas fa-phone"></i>
        <a href="tel:07750005345">07750005345</a> | 
        <a href="tel:07850005345">07850005345</a>
        <span style="margin: 0 15px;">|</span>
        <i class="fas fa-map-marker-alt"></i>
        مجمع بوابة الكاظمية - الشارع التجاري
    </div>
    
    <button class="cart-btn" onclick="toggleCart()">
        <i class="fas fa-shopping-basket"></i>
        <span class="cart-count" id="cartCount">0</span
